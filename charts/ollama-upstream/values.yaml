# values.yaml - Default configuration for the Ollama chart
image:
  repository: ollama/ollama
  tag: "0.17.7"
  pullPolicy: IfNotPresent

# Models to pull on startup
models:
  pull: "llama3"

# Ollama specific environment variables
ollama:
  keep_alive: "5m"
  num_parallel: 1
  max_loaded_models: 1
  context_length: 65536

# Service configuration
service:
  type: ClusterIP
  port: 11434
  loadBalancerIP: ""

# Ingress configuration
ingress:
  enabled: false
  host: ""
  # annotations: {}
  # tls: []

# Persistence configuration
persistence:
  enabled: true
  size: "20Gi"
  storageClassName: ""
  accessMode: ReadWriteOnce
  mountPath: /root/.ollama

# Hardware and GPU configuration
hardware:
  type: "nvidia"

gpu:
  enabled: true
  count: 1
  runtimeClassName: "nvidia"

# Pod resource requests and limits
# These will be merged with GPU limits if enabled
resources: {}
  # requests:
  #   cpu: "500m"
  #   memory: "4Gi"
  # limits:
  #   cpu: "4"
  #   memory: "16Gi"

# NFS storage configuration (takes priority over PVC when enabled)
nfs:
  enabled: false
  server: "10.9.0.250"
  path: "/data/ollama"

# Node selector and tolerations for scheduling
nodeSelector: {}
tolerations: []
affinity: {}
