# questions.yaml for Rancher UI
questions:
- variable: models.pull
  label: "Default Models"
  description: "Comma-separated list of models to pull on startup (e.g., llama3,codellama,mistral)."
  type: "string"
  default: "llama3"
  group: "Ollama Settings"
  required: true

- variable: service.type
  label: "Service Type"
  description: "Kubernetes service type to expose Ollama."
  type: "enum"
  options:
    - "ClusterIP"
    - "NodePort"
    - "LoadBalancer"
  default: "ClusterIP"
  group: "Networking"
  required: true

- variable: service.loadBalancerIP
  label: "Load Balancer IP"
  description: "Static IP address to assign to the LoadBalancer. Leave empty for automatic assignment."
  type: "string"
  default: ""
  show_if: "service.type=LoadBalancer"
  group: "Networking"

- variable: service.port
  label: "Service Port"
  description: "The port for the Ollama service."
  type: "int"
  default: 11434
  group: "Networking"
  required: true

- variable: ingress.enabled
  label: "Enable Ingress"
  description: "Expose the Ollama service via an Ingress controller."
  type: "boolean"
  default: false
  group: "Networking"

- variable: ingress.host
  label: "Ingress Host"
  description: "The hostname for the Ingress rule (e.g., ollama.example.com)."
  type: "hostname"
  show_if: "ingress.enabled=true"
  group: "Networking"
  required: true

- variable: persistence.enabled
  label: "Enable Persistence"
  description: "Enable persistent storage for models to survive pod restarts."
  type: "boolean"
  default: true
  group: "Storage"

- variable: persistence.size
  label: "Persistence Size"
  description: "The size of the Persistent Volume Claim (PVC) for storing models."
  type: "string"
  default: "20Gi"
  show_if: "persistence.enabled=true"
  group: "Storage"
  required: true

- variable: persistence.storageClassName
  label: "Storage Class"
  description: "The StorageClass to use for the PVC. Leave empty to use the cluster default."
  type: "storageclass"
  default: ""
  show_if: "persistence.enabled=true"
  group: "Storage"

- variable: nfs.enabled
  label: "Use NFS Storage"
  description: "Mount an NFS share for model storage. When enabled, NFS takes priority over PVC."
  type: "boolean"
  default: false
  group: "NFS Storage"

- variable: nfs.server
  label: "NFS Server"
  description: "IP address or hostname of the NFS server."
  type: "string"
  default: "10.9.0.250"
  show_if: "nfs.enabled=true"
  group: "NFS Storage"
  required: true

- variable: nfs.path
  label: "NFS Export Path"
  description: "The exported path on the NFS server to mount for model storage."
  type: "string"
  default: "/data/ollama"
  show_if: "nfs.enabled=true"
  group: "NFS Storage"
  required: true

- variable: hardware.type
  label: "Target Hardware"
  description: "Select the target hardware. 'nvidia' for GPU acceleration, 'cpu' for general purpose."
  type: "enum"
  required: true
  default: "nvidia"
  group: "Hardware"
  options:
    - "nvidia"
    - "cpu"

- variable: gpu.enabled
  label: "Enable NVIDIA GPU"
  description: "Use NVIDIA GPUs for acceleration. Requires the NVIDIA device plugin on the cluster."
  type: "boolean"
  default: true
  show_if: "hardware.type=nvidia"
  group: "Hardware"

- variable: gpu.count
  label: "GPU Count"
  description: "Number of GPUs to request."
  type: "int"
  default: 1
  min: 1
  show_if: "gpu.enabled=true"
  group: "Hardware"

- variable: gpu.runtimeClassName
  label: "Runtime Class Name"
  description: "Specify the runtime class for GPU nodes (e.g., 'nvidia'). Leave empty if not needed."
  type: "string"
  default: "nvidia"
  show_if: "gpu.enabled=true"
  group: "Hardware"

- variable: ollama.keep_alive
  label: "OLLAMA_KEEP_ALIVE"
  description: "Controls how long a model stays loaded in memory. Default: 5m."
  type: "string"
  default: "5m"
  group: "Advanced"

- variable: ollama.num_parallel
  label: "OLLAMA_NUM_PARALLEL"
  description: "The number of models that can be loaded in parallel."
  type: "int"
  default: 1
  group: "Advanced"

- variable: ollama.max_loaded_models
  label: "OLLAMA_MAX_LOADED_MODELS"
  description: "The maximum number of models that can be loaded at once."
  type: "int"
  default: 1
  group: "Advanced"

- variable: ollama.context_length
  label: "OLLAMA_CONTEXT_LENGTH"
  description: "The context length to use for model inference."
  type: "int"
  default: 65536
  group: "Advanced"
